services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - heirloom-data:/app/server/data
    restart: unless-stopped

  # Optional: letters read in the writer's own cloned voice (MIT-licensed
  # Chatterbox). Runs the Python sidecar in server/voice/sidecar/. It works on
  # CPU but is slow there — a CUDA GPU is strongly recommended. To enable:
  # uncomment, set TTS_PROVIDER=chatterbox and CHATTERBOX_URL=http://chatterbox:8004
  # in .env, and provide a GPU-enabled Docker runtime if you have one.
  #
  # chatterbox:
  #   build:
  #     context: ./server/voice/sidecar
  #   ports:
  #     - "8004:8004"

volumes:
  heirloom-data:
